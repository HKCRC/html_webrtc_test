<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WebRTC Wall - 双画面 8400x3840</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="viewport">
      <div class="stage" id="stage">
        <section class="panel main-up" data-stream="main_up">
          <video autoplay muted playsinline></video>
          <div class="label">
            <div class="name">主视角 4K</div>
            <div class="stream-status">等待连接中...</div>
          </div>
        </section>

        <section class="panel car-down" data-stream="car_down">
          <video autoplay muted playsinline></video>
          <div class="label">
            <div class="name">小车向下视角 4K</div>
            <div class="stream-status">等待连接中...</div>
          </div>
        </section>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
